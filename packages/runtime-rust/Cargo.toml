[package]
name = "orca-runtime-rust"
version = "0.1.0"
edition = "2021"
description = "Orca state machine runtime with C FFI"

[lib]
name = "orca_runtime_rust"
crate-type = ["cdylib", "staticlib", "rlib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
libc = "0.2"

