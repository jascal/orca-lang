[project]
name = "orca-demo-python"
version = "0.1.0"
description = "Demo app using orca-runtime-python"
requires-python = ">=3.9"
dependencies = [
    "orca-runtime-python @ file:///../runtime-python"
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
