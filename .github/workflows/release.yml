name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # ── npm: orca (core CLI + library) ──────────────────────────────────────────
  publish-npm-orca:
    name: Publish orca (npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        working-directory: packages/orca-lang

      - name: Publish
        run: npm publish --access public
        working-directory: packages/orca-lang
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── npm: @orca-lang/orca-runtime-ts ─────────────────────────────────────────
  publish-npm-runtime-ts:
    name: Publish @orca-lang/orca-runtime-ts (npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        working-directory: packages/runtime-ts

      - name: Publish
        run: npm publish --access public
        working-directory: packages/runtime-ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── npm: @orca-lang/orca-mcp-server ─────────────────────────────────────────
  publish-npm-mcp-server:
    name: Publish @orca-lang/orca-mcp-server (npm)
    runs-on: ubuntu-latest
    needs: publish-npm-orca
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build orca (dependency)
        run: pnpm run build
        working-directory: packages/orca-lang

      - name: Build mcp-server
        run: pnpm run build
        working-directory: packages/mcp-server

      - name: Publish
        run: npm publish --access public
        working-directory: packages/mcp-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── PyPI: orca-runtime-python ────────────────────────────────────────────────
  publish-pypi:
    name: Publish orca-runtime-python (PyPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Build
        run: python -m build
        working-directory: packages/runtime-python

      - name: Publish
        run: twine upload dist/*
        working-directory: packages/runtime-python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # ── Go: tag packages/runtime-go/vX.Y.Z for module proxy ─────────────────────
  tag-go:
    name: Tag Go module
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Push Go module tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "packages/runtime-go/v${{ steps.version.outputs.version }}"
          git push --force origin "packages/runtime-go/v${{ steps.version.outputs.version }}"

  # ── GitHub Release notes ─────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - publish-npm-orca
      - publish-npm-runtime-ts
      - publish-npm-mcp-server
      - publish-pypi
      - tag-go
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog entry
        id: changelog
        run: |
          # Pull the first version block from CHANGELOG.md
          VERSION="${GITHUB_REF_NAME}"
          BODY=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
