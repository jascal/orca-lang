name: Release

# Triggered by:
#   - git push of a version tag (v*) — automatic CI releases
#   - workflow_dispatch — manual trigger from GitHub UI
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── npm: orca (core CLI + library) ──────────────────────────────────────────
  publish-npm-orca:
    name: Publish orca (npm)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        working-directory: packages/orca-lang

      - name: Publish
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "${PKG}@${VER}" >/dev/null 2>&1; then
            echo "Already published ${PKG}@${VER}, skipping"
          else
            pnpm publish --access public --no-git-checks
          fi
        working-directory: packages/orca-lang
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── npm: @orca-lang/orca-runtime-ts ─────────────────────────────────────────
  publish-npm-runtime-ts:
    name: Publish @orca-lang/orca-runtime-ts (npm)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        working-directory: packages/runtime-ts

      - name: Publish
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "${PKG}@${VER}" >/dev/null 2>&1; then
            echo "Already published ${PKG}@${VER}, skipping"
          else
            pnpm publish --access public --no-git-checks
          fi
        working-directory: packages/runtime-ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── npm: @orca-lang/orca-mcp-server ─────────────────────────────────────────
  publish-npm-mcp-server:
    name: Publish @orca-lang/orca-mcp-server (npm)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-npm-orca
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build orca (dependency)
        run: pnpm run build
        working-directory: packages/orca-lang

      - name: Build mcp-server
        run: pnpm run build
        working-directory: packages/mcp-server

      - name: Publish
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "${PKG}@${VER}" >/dev/null 2>&1; then
            echo "Already published ${PKG}@${VER}, skipping"
          else
            # Publish from monorepo root so pnpm can rewrite workspace:* to actual versions
            pnpm publish --filter @orcalang/orca-mcp-server --access public --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── PyPI: orca-runtime-python ────────────────────────────────────────────────
  publish-pypi:
    name: Publish orca-runtime-python (PyPI)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Build
        run: python -m build
        working-directory: packages/runtime-python

      - name: Publish
        run: |
          PKG="orca-runtime-python"
          VER=$(python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          if pip index versions "${PKG}" 2>/dev/null | grep -q "${VER}"; then
            echo "Already published ${PKG}==${VER}, skipping"
          else
            twine upload dist/*
          fi
        working-directory: packages/runtime-python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # ── Go: tag packages/runtime-go/vX.Y.Z for module proxy ─────────────────────
  tag-go:
    name: Tag Go module
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    # Uses a PAT (not GitHub App token) for git tag push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Push Go module tag
        env:
          GH_TOKEN: ${{ secrets.GO_MODULE_PAT }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "packages/runtime-go/v${{ steps.version.outputs.version }}"
          git push --force origin "packages/runtime-go/v${{ steps.version.outputs.version }}"

  # ── MCP Registry ─────────────────────────────────────────────────────────────
  publish-mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-npm-mcp-server
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download mcp-publisher
        run: |
          VERSION=$(curl -s https://api.github.com/repos/modelcontextprotocol/registry/releases/latest | grep -o '"tag_name": "v[^"]*' | cut -d'"' -f4)
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/download/${VERSION}/linux_amd64.tar.gz" | tar xz
          chmod +x mcp-publisher
      - name: Publish to MCP Registry
        run: ./mcp-publisher publish --npm-token=${{ secrets.NPM_TOKEN }}

  # ── GitHub Release notes ─────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # Only run when triggered by a tag push; skip for manual workflow_dispatch without tag
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - publish-npm-orca
      - publish-npm-runtime-ts
      - publish-npm-mcp-server
      - publish-pypi
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog entry
        id: changelog
        run: |
          # Pull the first version block from CHANGELOG.md
          VERSION="${GITHUB_REF_NAME}"
          BODY=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
